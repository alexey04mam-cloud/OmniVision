<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omni-Vision — Вхід</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0a0e17;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    overflow:hidden;
}
/* animated bg */
body::before{
    content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
    background:radial-gradient(ellipse at 30% 20%,rgba(0,224,255,.08) 0%,transparent 50%),
               radial-gradient(ellipse at 70% 80%,rgba(0,255,136,.06) 0%,transparent 50%);
    animation:drift 20s ease-in-out infinite alternate;z-index:0;
}
@keyframes drift{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-5%,3%) rotate(3deg)}}

.login-card{
    position:relative;z-index:1;
    width:420px;max-width:92vw;
    background:rgba(15,20,35,.85);
    border:1px solid rgba(0,224,255,.15);
    border-radius:20px;
    padding:48px 40px;
    backdrop-filter:blur(20px);
    box-shadow:0 0 60px rgba(0,224,255,.06),0 25px 50px rgba(0,0,0,.5);
}
.logo{
    text-align:center;margin-bottom:32px;
}
.logo-icon{
    display:inline-flex;align-items:center;justify-content:center;
    width:64px;height:64px;border-radius:16px;
    background:linear-gradient(135deg,#00e0ff,#00ff88);
    font-size:28px;font-weight:800;color:#0a0e17;
    margin-bottom:16px;
    box-shadow:0 0 30px rgba(0,224,255,.3);
}
.logo h1{
    font-size:24px;font-weight:700;
    background:linear-gradient(90deg,#00e0ff,#00ff88);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:1px;
}
.logo p{color:rgba(255,255,255,.4);font-size:13px;margin-top:4px}

.form-group{margin-bottom:20px}
.form-group label{
    display:block;color:rgba(255,255,255,.6);font-size:13px;
    margin-bottom:6px;font-weight:500;
}
.form-group input{
    width:100%;padding:14px 16px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:12px;color:#fff;font-size:15px;
    transition:all .3s;outline:none;
}
.form-group input:focus{
    border-color:#00e0ff;
    box-shadow:0 0 20px rgba(0,224,255,.15);
    background:rgba(255,255,255,.08);
}
.form-group input::placeholder{color:rgba(255,255,255,.25)}

.btn-login{
    width:100%;padding:14px;margin-top:8px;
    background:linear-gradient(135deg,#00e0ff,#00ff88);
    border:none;border-radius:12px;
    color:#0a0e17;font-size:16px;font-weight:700;
    cursor:pointer;transition:all .3s;
    letter-spacing:.5px;
}
.btn-login:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 30px rgba(0,224,255,.3);
}
.btn-login:active{transform:translateY(0)}

.error-msg{
    background:rgba(255,59,48,.1);
    border:1px solid rgba(255,59,48,.3);
    border-radius:10px;padding:12px 16px;
    color:#ff6b6b;font-size:13px;text-align:center;
    margin-bottom:20px;
    display:none;
}
.error-msg.show{display:block}

.footer{
    text-align:center;margin-top:24px;
    color:rgba(255,255,255,.2);font-size:12px;
}

/* particles */
.particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.particle{
    position:absolute;width:2px;height:2px;background:#00e0ff;border-radius:50%;
    opacity:.3;animation:float-up linear infinite;
}
@keyframes float-up{
    0%{transform:translateY(100vh) scale(0);opacity:0}
    10%{opacity:.3}
    90%{opacity:.3}
    100%{transform:translateY(-10vh) scale(1);opacity:0}
}
</style>
</head>
<body>
<div class="particles" id="particles"></div>

<div class="login-card">
    <div class="logo">
        <div class="logo-icon">OV</div>
        <h1>OMNI-VISION</h1>
        <p>Autonomous Market Radar v0.8</p>
    </div>

    <div class="error-msg {{ERROR_CLASS}}" id="errorMsg">
        Невірний логін або пароль
    </div>

    <form method="POST" action="/login" id="loginForm">
        <div class="form-group">
            <label>Логін</label>
            <input type="text" name="username" placeholder="Введіть логін" required autocomplete="username" autofocus>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <div style="position:relative">
                <input type="password" name="password" id="passInput" placeholder="Введіть пароль" required autocomplete="current-password" style="padding-right:48px">
                <button type="button" onclick="togglePass()" id="eyeBtn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:18px;padding:4px" title="Показати пароль">👁</button>
            </div>
        </div>
        <button type="submit" class="btn-login">Увійти</button>
    </form>

    <div class="login-link" style="text-align:center;margin-top:20px;color:rgba(255,255,255,.4);font-size:13px">
        Немає акаунту? <a href="/register" style="color:#00e0ff;text-decoration:none;font-weight:600">Зареєструватись</a>
    </div>

    <div class="footer">
        Omni-Vision &copy; 2024-2026 | Захищений доступ
    </div>
</div>

<script>
// Toggle password visibility
function togglePass(){
    var p=document.getElementById('passInput'),b=document.getElementById('eyeBtn');
    if(p.type==='password'){p.type='text';b.textContent='🙈'}
    else{p.type='password';b.textContent='👁'}
}

// Show errors
var loginErrors={'wrong':'Невірний логін або пароль','blocked':'Забагато спроб. Зачекайте 5 хвилин.'};
var params=new URLSearchParams(location.search);
var err=params.get('error');
if(err && loginErrors[err]){
    var el=document.getElementById('errorMsg');
    el.textContent=loginErrors[err];
    el.classList.add('show');
}

// Floating particles
const pc = document.getElementById('particles');
for(let i=0;i<30;i++){
    const p = document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(8+Math.random()*12)+'s';
    p.style.animationDelay=Math.random()*10+'s';
    p.style.width=p.style.height=(1+Math.random()*2)+'px';
    if(Math.random()>.5) p.style.background='#00ff88';
    pc.appendChild(p);
}
</script>
</body>
</html>
