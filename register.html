<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omni-Vision — Реєстрація</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0a0e17;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    overflow:hidden;
}
body::before{
    content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
    background:radial-gradient(ellipse at 30% 20%,rgba(0,224,255,.08) 0%,transparent 50%),
               radial-gradient(ellipse at 70% 80%,rgba(0,255,136,.06) 0%,transparent 50%);
    animation:drift 20s ease-in-out infinite alternate;z-index:0;
}
@keyframes drift{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-5%,3%) rotate(3deg)}}

.login-card{
    position:relative;z-index:1;
    width:420px;max-width:92vw;
    background:rgba(15,20,35,.85);
    border:1px solid rgba(0,224,255,.15);
    border-radius:20px;
    padding:44px 40px;
    backdrop-filter:blur(20px);
    box-shadow:0 0 60px rgba(0,224,255,.06),0 25px 50px rgba(0,0,0,.5);
}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{
    display:inline-flex;align-items:center;justify-content:center;
    width:56px;height:56px;border-radius:14px;
    background:linear-gradient(135deg,#00e0ff,#00ff88);
    font-size:24px;font-weight:800;color:#0a0e17;
    margin-bottom:12px;
    box-shadow:0 0 30px rgba(0,224,255,.3);
}
.logo h1{
    font-size:22px;font-weight:700;
    background:linear-gradient(90deg,#00e0ff,#00ff88);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo p{color:rgba(255,255,255,.4);font-size:13px;margin-top:4px}

.form-group{margin-bottom:16px}
.form-group label{
    display:block;color:rgba(255,255,255,.6);font-size:13px;
    margin-bottom:5px;font-weight:500;
}
.form-group input{
    width:100%;padding:12px 16px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:12px;color:#fff;font-size:14px;
    transition:all .3s;outline:none;
}
.form-group input:focus{
    border-color:#00e0ff;
    box-shadow:0 0 20px rgba(0,224,255,.15);
    background:rgba(255,255,255,.08);
}
.form-group input::placeholder{color:rgba(255,255,255,.25)}

.btn-register{
    width:100%;padding:13px;margin-top:8px;
    background:linear-gradient(135deg,#00e0ff,#00ff88);
    border:none;border-radius:12px;
    color:#0a0e17;font-size:15px;font-weight:700;
    cursor:pointer;transition:all .3s;
}
.btn-register:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 30px rgba(0,224,255,.3);
}
.btn-register:active{transform:translateY(0)}

.error-msg{
    background:rgba(255,59,48,.1);
    border:1px solid rgba(255,59,48,.3);
    border-radius:10px;padding:10px 14px;
    color:#ff6b6b;font-size:13px;text-align:center;
    margin-bottom:16px;display:none;
}
.error-msg.show{display:block}

.login-link{
    text-align:center;margin-top:20px;
    color:rgba(255,255,255,.4);font-size:13px;
}
.login-link a{
    color:#00e0ff;text-decoration:none;font-weight:600;
}
.login-link a:hover{text-decoration:underline}

.particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.particle{
    position:absolute;width:2px;height:2px;background:#00e0ff;border-radius:50%;
    opacity:.3;animation:float-up linear infinite;
}
@keyframes float-up{
    0%{transform:translateY(100vh) scale(0);opacity:0}
    10%{opacity:.3}90%{opacity:.3}
    100%{transform:translateY(-10vh) scale(1);opacity:0}
}
</style>
</head>
<body>
<div class="particles" id="particles"></div>

<div class="login-card">
    <div class="logo">
        <div class="logo-icon">OV</div>
        <h1>OMNI-VISION</h1>
        <p>Створіть акаунт</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form method="POST" action="/register" id="regForm">
        <div class="form-group">
            <label>Ім'я користувача</label>
            <input type="text" name="username" placeholder="Мінімум 3 символи" required minlength="3" maxlength="64" autofocus>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <div style="position:relative">
                <input type="password" name="password" id="passInput" placeholder="Мінімум 6 символів" required minlength="6" style="padding-right:48px">
                <button type="button" onclick="togglePass('passInput','eyeBtn1')" id="eyeBtn1" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:18px;padding:4px">👁</button>
            </div>
        </div>
        <div class="form-group">
            <label>Підтвердіть пароль</label>
            <div style="position:relative">
                <input type="password" name="password2" id="passInput2" placeholder="Повторіть пароль" required minlength="6" style="padding-right:48px">
                <button type="button" onclick="togglePass('passInput2','eyeBtn2')" id="eyeBtn2" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:18px;padding:4px">👁</button>
            </div>
        </div>
        <button type="submit" class="btn-register">Зареєструватись</button>
    </form>

    <div class="login-link">
        Вже є акаунт? <a href="/login">Увійти</a>
    </div>
</div>

<script>
function togglePass(inputId, btnId){
    var p=document.getElementById(inputId),b=document.getElementById(btnId);
    if(p.type==='password'){p.type='text';b.textContent='🙈'}
    else{p.type='password';b.textContent='👁'}
}

var errors={
    'mismatch':'Паролі не співпадають',
    'short':'Пароль занадто короткий (мін. 6 символів)',
    'too_long':'Пароль занадто довгий',
    'username_short':'Ім\'я занадто коротке (мін. 3 символи)',
    'username_invalid':'Ім\'я може містити тільки букви, цифри та _ (3-32 символи)',
    'email_invalid':'Невірний формат email',
    'exists':'Це ім\'я вже зайняте',
    'email_exists':'Цей email вже зареєстрований',
    'blocked':'Забагато спроб. Зачекайте 5 хвилин.'
};
var params=new URLSearchParams(location.search);
var err=params.get('error');
if(err && errors[err]){
    var el=document.getElementById('errorMsg');
    el.textContent=errors[err];
    el.classList.add('show');
}

// Particles
var pc=document.getElementById('particles');
for(var i=0;i<25;i++){
    var p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(8+Math.random()*12)+'s';
    p.style.animationDelay=Math.random()*10+'s';
    p.style.width=p.style.height=(1+Math.random()*2)+'px';
    if(Math.random()>.5) p.style.background='#00ff88';
    pc.appendChild(p);
}

// Client-side password match check
document.getElementById('regForm').addEventListener('submit',function(e){
    var p1=document.querySelector('[name=password]').value;
    var p2=document.querySelector('[name=password2]').value;
    if(p1!==p2){
        e.preventDefault();
        var el=document.getElementById('errorMsg');
        el.textContent=errors['mismatch'];
        el.classList.add('show');
    }
});
</script>
</body>
</html>
